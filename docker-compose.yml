version: "3.8"

services:
  tv_redirector:
    build: .
    container_name: tv_redirector
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    restart: always
    env_file:
      - .env

  nginx:
    image: nginx:stable-alpine
    container_name: tv_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - tv_redirector
