<!DOCTYPE html>
<html>
<head>
    <title>TV Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa;">
    <div style="width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
        <h2 class="text-center mb-4">Актуальная ссылка</h2>
        {% if message %}<p style="color: green; text-align: center;">{{ message }}</p>{% endif %}
        {% if error %}<p style="color: red; text-align: center;">{{ error }}</p>{% endif %}
        <form method="post" action="/admin/update">
            <div class="mb-3">
                <label for="tvLink" class="form-label">Ссылка на трансляцию</label>
                <input type="text" name="tv_link" id="tvLink" class="form-control" value="{{ current_link }}" placeholder="Введите новую ссылку">
            </div>
            <button type="submit" class="btn btn-primary w-100">Обновить</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
